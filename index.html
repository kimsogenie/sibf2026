<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#111111">
<title>SIBF 2026 부스 배치도</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f0f0eb; color: #111; }

/* 헤더 */
.header {
  background: #111; color: #fff;
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.header-text h1 { font-size: 13px; font-weight: 700; line-height: 1.3; }
.header-text span { font-size: 10px; color: #888; }
.search-wrap { margin-left: auto; position: relative; flex-shrink: 0; }
#search {
  background: #222; border: 1px solid #444; color: #fff;
  padding: 7px 10px 7px 28px; border-radius: 20px;
  font-size: 12px; width: 140px; outline: none;
  -webkit-appearance: none;
}
#search::placeholder { color: #666; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; }
.search-results {
  display: none; position: absolute; top: calc(100% + 6px); right: 0;
  width: 240px; background: #fff; border: 1px solid #ddd;
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  max-height: 260px; overflow-y: auto; z-index: 200;
}
.sri { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 12px; }
.sri:hover, .sri:active { background: #f5f5f0; }
.sri .sno { font-size: 10px; color: #888; margin-bottom: 2px; }

/* 탭 */
.tabs { display: flex; background: #f0f0eb; border-bottom: 2px solid #ddd; padding: 0 16px; }
.tab {
  padding: 10px 18px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; background: none; color: #999;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  touch-action: manipulation;
}
.tab.active { color: #111; border-bottom-color: #111; }

/* 홀 */
.hall { display: none; padding: 14px 16px 60px; }
.hall.active { display: block; }
.hall-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }

/* 범례 */
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; font-size: 10px; }
.li { display: flex; align-items: center; gap: 4px; }
.ld { width: 10px; height: 10px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; }

/* 안내 */
.hint {
  font-size: 11px; color: #888; margin-bottom: 10px;
  display: flex; align-items: center; gap: 4px;
}

/* 지도 */
.map-scroll {
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  border: 2px solid #ccc;
  border-radius: 6px;
  background: #fff;
  max-width: 100%;
}
.floor-map {
  position: relative;
  background: #fff;
  /* 터치로 스크롤 가능하도록 */
  touch-action: pan-x pan-y;
}

/* 부스 */
.booth {
  position: absolute;
  background: #e2e2e2;
  border: 1px solid #b8b8b8;
  border-radius: 2px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2px;
  cursor: pointer; overflow: hidden;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
  transition: filter 0.1s;
}
.booth:active { filter: brightness(0.82); }
.booth.hl { outline: 3px solid #e5b800; outline-offset: 1px; z-index: 60; background: #ffe566 !important; }

.bn { font-size: 7.5px; font-weight: 700; color: #555; line-height: 1; margin-bottom: 1px; flex-shrink: 0; white-space: nowrap; }
.bname { font-size: 8px; font-weight: 500; color: #111; line-height: 1.3; word-break: keep-all; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

/* 특수 색상 */
.sp-yellow { background: #FFD600 !important; border-color: #d4aa00 !important; }
.sp-yellow .bn { color: #7a6000; }
.sp-black { background: #111 !important; border-color: #000 !important; }
.sp-black .bn { color: #888; }
.sp-black .bname { color: #fff; }
.sp-purple { background: #c5aee8 !important; border-color: #8c6bbf !important; }
.sp-blue { background: #7ec8e3 !important; border-color: #3399bb !important; }
.sp-orange { background: #FF6B00 !important; border-color: #cc5500 !important; }
.sp-orange .bn { color: #ffd0a0; }
.sp-orange .bname { color: #fff; }

/* 모바일 팝업 (툴팁 대신) */
.popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 500;
  backdrop-filter: blur(2px);
}
.popup-overlay.show { display: flex; align-items: flex-end; }
.popup {
  background: #fff; border-radius: 16px 16px 0 0;
  padding: 20px 20px 40px;
  width: 100%; max-height: 60vh; overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.popup-no { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 6px; }
.popup-name { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 6px; line-height: 1.3; }
.popup-list { font-size: 13px; color: #555; line-height: 2; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }
.popup-list div { border-bottom: 1px solid #f5f5f5; padding: 4px 0; }
.popup-close {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px; border-radius: 50%;
  background: #eee; border: none; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* 푸터 */
.footer {
  text-align: center; padding: 28px 20px 40px;
  font-size: 11px; color: #888;
  border-top: 1px solid #ddd; margin-top: 20px; line-height: 1.9;
}
.footer .ft { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 6px; }
.footer a { color: #555; font-weight: 600; text-decoration: none; }

/* 시설 요소 */
.fac {
  position: absolute;
  display: flex; align-items: center; justify-content: center;
  text-align: center; font-size: 9px; font-weight: 700;
  border-radius: 3px; pointer-events: none !important; white-space: nowrap;
  z-index: 30;
}
.fac-wc {
  background: #e3f0ff; border: 1.5px solid #90c0f0;
  color: #3370b0; font-size: 13px; border-radius: 50%;
}
.fac-info {
  background: #fff3cd; border: 1.5px solid #f0c030;
  color: #7a5500; padding: 0 4px;
}
.fac-gate {
  background: #d4f5d4; border: 1.5px dashed #4caf50;
  color: #2a7a2a; padding: 0 4px; letter-spacing: -0.3px;
}
.fac-conn {
  background: #f0e8ff; border: 1.5px dashed #9c6fe0;
  color: #5a2da0; padding: 0 4px;
}

/* 시설 표시 */
.facility {
  position: absolute;
  display: flex;
  align-items: center; justify-content: center;
  text-align: center;
  font-size: 9px; font-weight: 700;
  line-height: 1.2;
  pointer-events: none !important;
  z-index: 30;
  overflow: visible;
  white-space: nowrap;
}
.fac-entrance {
  background: rgba(34,197,94,0.12);
  border: 1.5px dashed #22c55e;
  border-radius: 3px;
  color: #15803d;
}
.fac-exit {
  background: rgba(239,68,68,0.1);
  border: 1.5px dashed #ef4444;
  border-radius: 3px;
  color: #b91c1c;
}
.fac-wc {
  background: rgba(59,130,246,0.15);
  border: 1.5px solid #3b82f6;
  border-radius: 50%;
  font-size: 14px;
  color: #1d4ed8;
}
.fac-ticket {
  background: rgba(168,85,247,0.1);
  border: 1.5px solid #a855f7;
  border-radius: 3px;
  color: #7e22ce;
  font-size: 8px;
}
.fac-ticket {
  background: rgba(168,85,247,0.12);
  border: 1.5px solid #a855f7;
  border-radius: 3px;
}
.fac-ticket .fac-label { color: #7e22ce; }
</style>
</head>

const SPECIAL = {"A1901":"sp-yellow","A2402":"sp-yellow","A1902":"sp-orange","A1903":"sp-orange","A1807":"sp-orange","A113":"sp-orange","B701":"sp-purple","B702":"sp-black","B703":"sp-black","B704":"sp-yellow","B400":"sp-blue","B705":"sp-orange","B706":"sp-orange","B707":"sp-orange","B207":"sp-orange","B609":"sp-orange"}

function getShort(id) {
  const names = BOOTH_DATA[id];
  if (!names || !names.length) return '';
  return names[0];
}

function buildMap(mapEl, coords, W, H) {
  mapEl.style.width = W + 'px';
  mapEl.style.height = H + 'px';
  Object.entries(coords).forEach(([id, c]) => {
    const el = document.createElement('div');
    el.className = 'booth' + (SPECIAL[id] ? ' ' + SPECIAL[id] : '');
    el.id = 'b-' + id;
    el.style.cssText = `left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px`;

    const no = document.createElement('div');
    no.className = 'bn'; no.textContent = id;
    const nm = document.createElement('div');
    nm.className = 'bname'; nm.textContent = getShort(id);

    el.appendChild(no); el.appendChild(nm);

    // 모바일: 탭하면 팝업
    el.addEventListener('click', () => showPopup(id));
    mapEl.appendChild(el);
  });
}

function showPopup(id) {
  const names = BOOTH_DATA[id];
  if (!names || !names.length || typeof names === 'undefined') return;
  document.getElementById('pop-no').textContent = id;
  document.getElementById('pop-name').textContent = names[0];
  if (names.length > 1) {
    document.getElementById('pop-list').innerHTML = names.slice(1).map(n => `<div>${n}</div>`).join('');
    document.getElementById('pop-list').style.display = 'block';
  } else {
    document.getElementById('pop-list').innerHTML = '';
    document.getElementById('pop-list').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
}

function closePopup(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('show');
}

function switchHall(hall) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (hall==='a'&&i===0)||(hall==='b1'&&i===1)));
  document.getElementById('hall-a').classList.toggle('active', hall==='a');
  document.getElementById('hall-b1').classList.toggle('active', hall==='b1');
}

// 검색
const searchInput = document.getElementById('search');
const srDiv = document.getElementById('sr');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { srDiv.style.display='none'; return; }
  const hits = [];
  Object.entries(BOOTH_DATA).forEach(([booth, names]) => {
    names.forEach(name => { if (name.toLowerCase().includes(q)) hits.push({booth, name}); });
  });
  if (!hits.length) { srDiv.style.display='none'; return; }
  srDiv.innerHTML = hits.slice(0,20).map(h =>
    `<div class="sri" onclick="goBooth('${h.booth}')"><div class="sno">${h.booth}</div>${h.name}</div>`
  ).join('');
  srDiv.style.display = 'block';
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) srDiv.style.display='none'; });

function goBooth(id) {
  srDiv.style.display='none'; searchInput.value='';
  const hall = id.startsWith('B') ? 'b1' : 'a';
  switchHall(hall);
  document.querySelectorAll('.booth.hl').forEach(el => el.classList.remove('hl'));
  setTimeout(() => {
    const el = document.getElementById('b-' + id);
    if (el) {
      el.classList.add('hl');
      el.scrollIntoView({behavior:'smooth', block:'center', inline:'center'});
      showPopup(id);
    }
  }, 80);
}
